name: CI_PIPELINE
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3
      - name: Installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Installer flake8
        run: pip install flake8
      - name: Lancer le linter
        run:  |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer les tests
        run: pytest tests/ -v --cov=app
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Générer le package
        run: python -m build
      - name: Upload du résultat
        uses: actions/upload-artifact@v3
